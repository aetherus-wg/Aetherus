[package]
name = "Aetherus"
version = "0.1.2"
authors = ["Freddy Wordingham <f.wordingham@exeter.ac.uk>", "Sam Morrell <s.morrell@exeter.ac.uk>"]
edition = "2018"
description = "Physics simulation library and binaries"
repository = "https://github.com/aetherus-wg/aetherus"
readme = "README.md"
license = "MIT"
keywords = ["physics", "mcrt", "rt"]
categories = ["science", "simulation"]
documentation = "https://aetherus-wg.github.io/aetherus"
exclude = ["docs/", "input/", "output/"]

[features]
default = []

[dependencies]
arctk-attr = "0.3.*"
arctk-proc = "0.4.*"

ansi_rgb = "0.2.*"
colored = "2.0.*"
hex = "0.4.*"
indicatif = "0.16.*"
json5 = "0.3.*"
lazy_static = "1.4.*"
nalgebra = { version = "0.27.0", features = ["serde-serialize"] }
ndarray = { version = "0.15.*", features = ["rayon", "serde-1"] }
ndarray-parallel = "0.9.*"
ndarray-stats = "0.5.*"
netcdf = "0.6.*"
num_cpus = "1.13.*"
palette = "0.5.*"
physical_constants = "0.4.1"
png = "0.16.*"
rand = "0.8.*"
rayon = "1.5.*"
rgb = "0.8.*"
serde = { version = "1.0.*", features = ["derive"] }
serde_json = "1.0.*"
slice-of-array = "0.3.*"
terminal_size = "0.1.*"

[lib]
