name: Continuous Benchmarking with Bencher

on:
  push:
    branches:
      - 'main'
      - 'develop'
      - 'feature**'
    paths:
     - '**/*.rs'
     - '**/Cargo.toml'
     - 'benches/**'
     - '.github/workflows/bencher.yml'
  pull_request:
      types: [opened, reopened, edited, synchronize]

jobs:
  benchmark_with_bencher:
    name: Continuous Benchmarking with Bencher
    permissions:
      checks: write
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
      PB_QUIET: 1
    steps:
      - uses: actions/checkout@v6
      - uses: bencherdev/bencher@main
      - name: Install dependencies HDF5 and netCDF
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libhdf5-dev libnetcdf-dev libfontconfig1-dev libfreetype6-dev
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: "cargo build --release"
      - name: Report performance
        run: |
          bencher run \
          --project $(echo "${{ github.repository }}" | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]') \
          --branch "$GITHUB_REF_NAME" \
          --testbed ubuntu-latest \
          --threshold-measure latency \
          --threshold-test t_test \
          --threshold-max-sample-size 64 \
          --threshold-upper-boundary 0.99 \
          --thresholds-reset \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
          --adapter rust_criterion \
          cargo bench
      - name: Report accuracy
        run: |
          bencher run \
          --project $(echo "${{ github.repository }}" | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]') \
          --branch "$GITHUB_REF_NAME" \
          --testbed ubuntu-latest \
          --threshold-measure "Mean Absolute Error" \
          --threshold-test static \
          --threshold-upper-boundary 0.1 \
          --threshold-measure "Root Mean Squared Error" \
          --threshold-test static \
          --threshold-upper-boundary 0.1 \
          --threshold-measure "Root Mean Squared Relative Error" \
          --threshold-test static \
          --threshold-upper-boundary 0.1 \
          --threshold-measure "Total Variation L1" \
          --threshold-test static \
          --threshold-upper-boundary 10.0 \
          --file results.json \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
            cargo bench accuracy
