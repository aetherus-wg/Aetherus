name: Rust

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies HDF5 and netCDF
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y libhdf5-dev libnetcdf-dev libfontconfig1-dev libfreetype6-dev
    - name: Rust cache
      uses: Swatinem/rust-cache@v2
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
